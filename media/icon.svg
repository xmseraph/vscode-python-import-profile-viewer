<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- tree branches -->
  <g stroke="#4ec9b0" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- trunk -->
    <line x1="32" y1="28" x2="32" y2="100"/>
    <!-- level 1 branches -->
    <line x1="32" y1="38" x2="52" y2="38"/>
    <line x1="32" y1="58" x2="52" y2="58"/>
    <line x1="32" y1="78" x2="52" y2="78"/>
    <line x1="32" y1="98" x2="52" y2="98"/>
    <!-- level 2 sub-branches -->
    <line x1="52" y1="38" x2="52" y2="52"/>
    <line x1="52" y1="45" x2="68" y2="45"/>
    <line x1="52" y1="52" x2="68" y2="52"/>
    <line x1="52" y1="78" x2="52" y2="92"/>
    <line x1="52" y1="85" x2="68" y2="85"/>
  </g>
  <!-- colour dots (timing indicators) -->
  <circle cx="56" cy="38" r="4" fill="#f44747"/>
  <circle cx="72" cy="45" r="3.5" fill="#cca700"/>
  <circle cx="72" cy="52" r="3.5" fill="#4ec9b0"/>
  <circle cx="56" cy="58" r="4" fill="#d18616"/>
  <circle cx="56" cy="78" r="4" fill="#cca700"/>
  <circle cx="72" cy="85" r="3.5" fill="#4ec9b0"/>
  <circle cx="56" cy="98" r="4" fill="#4ec9b0"/>
  <!-- clock / timer symbol -->
  <g transform="translate(92, 24)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="6" y2="3" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#e0e0e0"/>
  </g>
  <!-- "µs" text -->
  <text x="92" y="62" font-family="Consolas, monospace" font-size="13" fill="#cca700" text-anchor="middle" font-weight="bold">µs</text>
  <!-- Python snake hint -->
  <text x="92" y="106" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle">🐍</text>
</svg>
